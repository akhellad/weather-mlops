services:
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  api:
    build:
      context: ./services/api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - mlflow-server

  drift-monitor:
    build:
      context: ./services/drift_monitor
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data

  trainer:
    build:
      context: ./services/trainer
    env_file: .env
    profiles: ["jobs"]
    volumes:
      - ./data:/data
    depends_on:
      - mlflow-server

volumes:
  mlflow-data:
